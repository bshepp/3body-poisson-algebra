<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Explorer — Three-Body Poisson Algebra</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0c10;
  --bg-panel: #0f1218;
  --bg-card: #141820;
  --bg-card-hover: #1a1f2a;
  --border: #1e2430;
  --border-bright: #2a3040;
  --text-primary: #c8ccd4;
  --text-secondary: #7a8090;
  --text-dim: #4a5060;
  --phosphor: #3ddc84;
  --phosphor-dim: #1a6e3a;
  --phosphor-glow: rgba(61, 220, 132, 0.15);
  --amber: #f0a030;
  --amber-dim: #7a5018;
  --cyan: #4ac8e8;
  --cyan-dim: #1a5a6e;
  --violet: #a07ae0;
  --violet-dim: rgba(160, 122, 224, 0.15);
  --red: #e05555;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Source Serif 4', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; scroll-behavior: smooth; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--mono);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ─── Top Bar ─── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 2rem;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left { display: flex; align-items: center; gap: 1.5rem; }
.topbar-left a { color: var(--text-secondary); text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; transition: color 0.2s; }
.topbar-left a:hover { color: var(--phosphor); }
.topbar-left a.active { color: var(--phosphor); border-bottom: 1px solid var(--phosphor); }
.topbar-right { color: var(--text-dim); display: flex; align-items: center; gap: 0.8rem; }
.topbar-right a { color: var(--text-dim); transition: color 0.2s; }
.topbar-right a:hover { color: var(--phosphor); }
.topbar-right .gh-icon { width: 16px; height: 16px; fill: currentColor; vertical-align: middle; }

/* ─── Header ─── */
.header {
  padding: 1.5rem 2.5rem 1rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg-panel), var(--bg-deep));
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--phosphor-dim), transparent);
}

.header h1 { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; margin-bottom: 0.4rem; }
.header h1 span { color: var(--text-secondary); font-weight: 300; }

/* ─── Controls ─── */
.controls {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.8rem 2.5rem;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  max-width: 400px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.4rem 0.7rem;
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 0.78rem;
}

.search-box::placeholder { color: var(--text-dim); }
.search-box:focus { outline: none; border-color: var(--phosphor-dim); }

.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.35rem 0.7rem;
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.filter-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.filter-btn.active { background: var(--phosphor-dim); color: var(--phosphor); border-color: var(--phosphor-dim); }

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-left: auto;
}

.view-toggle button {
  background: var(--bg-card);
  border: none;
  border-right: 1px solid var(--border);
  padding: 0.35rem 0.6rem;
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;
}

.view-toggle button:last-child { border-right: none; }
.view-toggle button:hover { background: var(--bg-card-hover); }
.view-toggle button.active { background: var(--phosphor-dim); color: var(--phosphor); }

.count-display {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-left: 0.5rem;
}

/* ─── Gallery ─── */
.gallery-container {
  padding: 1.5rem 2rem;
}

.category-section { margin-bottom: 2rem; }

.category-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.4rem 0;
  margin-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.category-chevron {
  font-size: 0.7rem;
  color: var(--text-dim);
  transition: transform 0.2s;
  width: 1rem;
  text-align: center;
}

.category-header.open .category-chevron { transform: rotate(90deg); }

.category-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.category-count {
  font-size: 0.65rem;
  padding: 0.1rem 0.4rem;
  border-radius: 2px;
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
}

.category-items { display: none; }
.category-header.open + .category-items { display: grid; }

/* Grid view */
.grid-view {
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 0.8rem;
}

/* List view */
.list-view {
  grid-template-columns: 1fr;
  gap: 2px;
}

/* ─── Image Card ─── */
.img-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}

.img-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }

.img-thumb {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  display: block;
  background: var(--bg-deep);
}

.img-info {
  padding: 0.5rem 0.7rem;
}

.img-name {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.15rem;
}

.img-path {
  font-size: 0.62rem;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.img-tag {
  display: inline-block;
  font-size: 0.58rem;
  padding: 0.08rem 0.35rem;
  border-radius: 2px;
  margin-top: 0.2rem;
  margin-right: 0.2rem;
  font-weight: 600;
}

.tag-atlas { background: var(--phosphor-dim); color: var(--phosphor); }
.tag-triptych { background: var(--amber-dim); color: var(--amber); }
.tag-svd { background: var(--cyan-dim); color: var(--cyan); }
.tag-spectral { background: var(--violet-dim); color: var(--violet); }
.tag-potential { background: rgba(240,160,48,0.15); color: var(--amber); }
.tag-nbody { background: rgba(78,195,245,0.12); color: #4ec3f5; }
.tag-mass { background: rgba(160,122,224,0.12); color: var(--violet); }
.tag-4k { background: rgba(240,80,80,0.12); color: var(--red); }
.tag-calogero { background: rgba(61,220,132,0.12); color: var(--phosphor); }
.tag-level4 { background: rgba(240,160,48,0.12); color: var(--amber); }
.tag-charge { background: rgba(220,120,50,0.12); color: #dc7830; }
.tag-epsilon { background: rgba(100,180,240,0.12); color: #64b4f0; }
.tag-hires { background: rgba(200,100,200,0.12); color: #c864c8; }
.tag-bell { background: rgba(128,200,128,0.12); color: #80c880; }
.tag-helium { background: rgba(61,220,132,0.12); color: var(--phosphor); }
.tag-video { background: rgba(240,80,80,0.12); color: #f05050; }
.tag-gif { background: rgba(240,180,60,0.12); color: #f0b43c; }

/* List view card */
.list-view .img-card {
  display: grid;
  grid-template-columns: 120px 1fr;
  border-radius: 2px;
}

.list-view .img-thumb { aspect-ratio: 16/10; height: 70px; width: 120px; }
.list-view .img-info { display: flex; flex-direction: column; justify-content: center; }

/* ─── Lightbox ─── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 2rem;
}

.lightbox.open { display: flex; }

.lightbox-close {
  position: absolute;
  top: 1rem;
  right: 1.5rem;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.5rem;
  cursor: pointer;
  font-family: var(--mono);
  z-index: 10001;
}

.lightbox-close:hover { color: var(--text-primary); }

.lightbox img {
  max-width: 90vw;
  max-height: 80vh;
  object-fit: contain;
  border: 1px solid var(--border);
  border-radius: 4px;
}

.lightbox video {
  max-width: 90vw;
  max-height: 80vh;
  border: 1px solid var(--border);
  border-radius: 4px;
}

.lightbox-caption {
  margin-top: 1rem;
  text-align: center;
  max-width: 80vw;
}

.lightbox-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.3rem;
}

.lightbox-path {
  font-size: 0.72rem;
  color: var(--text-dim);
}

.lightbox-nav {
  display: flex;
  gap: 1rem;
  margin-top: 0.8rem;
}

.lightbox-nav button {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.4rem 1rem;
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.lightbox-nav button:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* ─── Data Files Section ─── */
.data-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.4rem;
  margin-bottom: 1.5rem;
}

.data-section h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--amber);
  margin-bottom: 0.8rem;
}

.data-file {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.4rem 0;
  font-size: 0.78rem;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

.data-file:last-child { border-bottom: none; }
.data-file .icon { color: var(--cyan); }
.data-file .name { color: var(--text-primary); font-weight: 500; }
.data-file .desc { color: var(--text-secondary); flex: 1; }
.data-file .size { color: var(--text-dim); font-size: 0.68rem; }

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .controls { padding: 0.6rem 1rem; }
  .gallery-container { padding: 1rem; }
  .grid-view { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
</style>
</head>

<div class="header">

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentFilter = 'all';
let currentView = 'grid';
let flatVisible = [];
let lbIndex = -1;

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function getFiltered() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  return IMAGES.filter(img => {
    if (currentFilter !== 'all' && !img.tags.includes(currentFilter)) return false;
    if (q && !img.name.toLowerCase().includes(q) && !img.path.toLowerCase().includes(q) && !img.cat.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderGallery() {
  const filtered = getFiltered();
  flatVisible = filtered;

  // Group by category
  const cats = {};
  filtered.forEach(img => {
    if (!cats[img.cat]) cats[img.cat] = [];
    cats[img.cat].push(img);
  });

  let html = '';

  // Data files section (always show at top when no filter or "all")
  if (currentFilter === 'all' && !document.getElementById('searchBox').value) {
    html += `<div class="data-section">
      <h3>Key Data Files</h3>
      <div class="data-file"><span class="icon">◇</span><span class="name">atlas_summary.json</span><span class="desc">11 atlas configs · rank statistics</span><span class="size">atlas_figures/</span></div>
      <div class="data-file"><span class="icon">◇</span><span class="name">mass_ratio_complete.json</span><span class="desc">25-pt mass sweep · all [3,6,17] · gap >10¹¹</span><span class="size">root</span></div>
      <div class="data-file"><span class="icon">◇</span><span class="name">n_body_scaling_results.json</span><span class="desc">N=5–8 dimension sequences</span><span class="size">nbody/</span></div>
      <div class="data-file"><span class="icon">◇</span><span class="name">n4_potential_universality_results.json</span><span class="desc">N=4 · 4 potentials · all_match: true</span><span class="size">nbody/</span></div>
      <div class="data-file"><span class="icon">◇</span><span class="name">completed.json</span><span class="desc">12 Level-4 runs (Lagrange/Euler/Scalene/Global)</span><span class="size">results/</span></div>
      <div class="data-file"><span class="icon">◇</span><span class="name">data_inventory.json</span><span class="desc">Full atlas dataset catalog · shapes, distributions</span><span class="size">root</span></div>
    </div>`;
  }

  for (const [catName, items] of Object.entries(cats)) {
    html += `<div class="category-section">
      <div class="category-header open" onclick="toggleCat(this)">
        <span class="category-chevron">▶</span>
        <span class="category-title">${catName}</span>
        <span class="category-count">${items.length}</span>
      </div>
      <div class="category-items ${currentView === 'grid' ? 'grid-view' : 'list-view'}">`;

    items.forEach((img, i) => {
      const globalIdx = flatVisible.indexOf(img);
      const tagHtml = img.tags.map(t => `<span class="img-tag tag-${t}">${t}</span>`).join('');
      const src = 'assets/' + img.path;

      if (img.isVideo) {
        html += `<div class="img-card" onclick="openLightbox(${globalIdx})">
          <div class="img-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--bg-card-hover);font-size:2rem;color:var(--text-dim);">▶</div>
          <div class="img-info">
            <div class="img-name">${img.name}</div>
            <div class="img-path">${img.path}</div>
            <div>${tagHtml}</div>
          </div>
        </div>`;
      } else {
        html += `<div class="img-card" onclick="openLightbox(${globalIdx})">
          <img class="img-thumb" src="${src}" alt="${img.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.img-info').style.borderTop='none'">
          <div class="img-info">
            <div class="img-name">${img.name}</div>
            <div class="img-path">${img.path}</div>
            <div>${tagHtml}</div>
          </div>
        </div>`;
      }
    });

    html += `</div></div>`;
  }

  document.getElementById('galleryContainer').innerHTML = html;
  document.getElementById('countDisplay').textContent = `${filtered.length} items`;
}

function filterGallery() { renderGallery(); }

function setFilter(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  renderGallery();
}

function setView(view, el) {
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentView = view;
  renderGallery();
}

function toggleCat(el) { el.classList.toggle('open'); }

// ═══════════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════════
function openLightbox(idx) {
  lbIndex = idx;
  const img = flatVisible[idx];
  const lb = document.getElementById('lightbox');
  const content = document.getElementById('lightboxContent');
  const src = 'assets/' + img.path;

  if (img.isVideo) {
    content.innerHTML = `<video src="${src}" controls autoplay style="max-width:90vw;max-height:80vh;"></video>`;
  } else {
    content.innerHTML = `<img src="${src}" alt="${img.name}">`;
  }

  document.getElementById('lbTitle').textContent = img.name;
  document.getElementById('lbPath').textContent = img.path;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  if (flatVisible.length === 0) return;
  lbIndex = (lbIndex + dir + flatVisible.length) % flatVisible.length;
  openLightbox(lbIndex);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox({target:{},currentTarget:{}});
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderGallery();
</script>

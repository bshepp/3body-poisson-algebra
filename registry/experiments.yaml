- id: nbody_run_schwarzschild
  path: nbody/run_schwarzschild.py
  category: dimseq
  scope: nbody/N3
  status: wip
  description: |
    Schwarzschild effective-potential dimension-sequence sweep.
    V_eff = -M*u + (L^2/2)*u^2 - M*L^2*u^3 expressed as a 3-term composite in u=1/r.
    Sweeps over a (M, L) grid testing whether [3, 6, 17, 116] is (M, L)-invariant
    (the GR analogue of mass-invariance). First Schwarzschild result in the project.
    A full 2D atlas in (r/M, L/M) is the natural follow-up once the dimseq battery
    is settled.
  inputs: []
  outputs:
    - results/schwarzschild/dimseq_l2_full.json
    - results/schwarzschild/dimseq_l3_key.json
    - results/schwarzschild/run.log
  latest_result:
    date: "2026-04-19"
    summary: |
      L2 full grid (30 (M,L) points) DONE in 2m11s: all give [3, 6, 17] - L2
      universality confirmed across the full Schwarzschild parameter grid. L3 on
      4 physically-meaningful points (M=1,L=1; M=1,L=2; M=1,L=4; M=2,L=1)
      RUNNING overnight, ETA ~4-5 hours.
    sequence: [3, 6, 17]
  runtime: L2 full (30 pts) ~2 min; L3 key (4 pts) ~4-5 hours; L3 full (30 pts) ~30+ hours
  cost_usd: 0
  run_command: |
    python nbody/run_schwarzschild.py --mode full --max-level 2 --samples 200 \
        --out results/schwarzschild/dimseq_l2_full.json
    python nbody/run_schwarzschild.py --mode key --max-level 3 --samples 500 \
        --out results/schwarzschild/dimseq_l3_key.json
  related_docs:
    - docs/supplemental_triage.md
  related_supplemental:
    - schwarzschild_scope.md
  tags: [dimseq, schwarzschild, GR, composite, P1]


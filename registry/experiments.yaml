- id: bench_flint
  path: bench_flint/bench.py
  category: diagnostic
  scope: tooling
  status: complete
  description: |
    python-flint vs default ground-types benchmark on the actual project workload.
    Three benches: (1) micro cancel() on a hard rational polynomial; (2) end-to-end
    Schwarzschild composite L<=2 dimseq; (3) end-to-end Schwarzschild composite L<=3.
    Run via `SYMPY_GROUND_TYPES=flint bench_flint/venv/Scripts/python bench_flint/bench.py`.
  inputs: []
  outputs:
    - bench_flint/results.jsonl
    - bench_flint/probe_flint.log
    - bench_flint/probe_python.log
  latest_result:
    date: "2026-04-19"
    summary: |
      NEGATIVE RESULT: SymPy 1.14.0 does not include DMP_Flint for multivariate
      polynomials (univariate only; PR #26793 still in development). Setting
      SYMPY_GROUND_TYPES=flint accelerates coefficient arithmetic but the
      polynomial GCD path falls back to DMP_Python. Measured per-bracket times
      are within 5-10% of stock Python (sometimes slightly slower due to FLINT
      coefficient overhead). FLINT is currently NOT a speedup for this project.
      Re-evaluate after PR #26793 merges in a future SymPy release.

      SECONDARY FINDING: probe.py shows together(raw) takes 3.43s and produces
      1 (factored) term while cancel(raw) takes 107s and produces 121,002
      (expanded) terms. Suggests simplify_generator() in nbody/exact_growth_nbody.py
      could be 10-30x faster by adopting a smarter canonicalization strategy
      (factored form internally, expand-on-demand for SVD evaluation). Worth
      a focused experiment.
    sequence: []
  runtime: ~10 min for full L3 bench
  cost_usd: 0
  run_command: |
    SYMPY_GROUND_TYPES=flint bench_flint/venv/Scripts/python bench_flint/bench.py
    python bench_flint/bench.py
  related_docs:
    - docs/supplemental_triage.md
  related_supplemental: []
  tags: [diagnostic, benchmark, flint, performance]

- id: bench_simplify_phases
  path: bench_flint/run_simplify_phases.py
  category: diagnostic
  scope: tooling
  status: complete
  description: |
    Three-phase smarter-simplify experiment. Tests whether `together` can replace
    `cancel` in NBodyAlgebra.simplify_generator. Each phase runs strategies
    serially under a watchdog (hard wall-clock timeout + RSS cap). Phase 1 is a
    L<=2 sanity gate; Phase 2 is the 1/r L<=3 controlled baseline; Phase 3 is
    Schwarzschild composite L<=3 (the production-relevant heavy case).
  inputs: []
  outputs:
    - bench_flint/phase1_results.json
    - bench_flint/phase2_results.json
    - bench_flint/phase3_results.json
    - bench_flint/p3_together_500samples.json
    - bench_flint/simplify_phases_summary.md
  latest_result:
    date: "2026-04-19"
    summary: |
      DEFINITIVE WIN. together() is >200x faster than cancel() on Schwarzschild
      composite L<=3 (90s vs cancel killed at 16 GB RAM cap after 90 minutes;
      yesterday's run took 12 hours and reached 35 GB before manual kill).
      Critically: together produces the canonical [3, 6, 17, 116] dim sequence
      at the production sample count of 500. Phase 2 (N=3 1/r L<=3) showed 109x
      speedup with bit-identical truncated dim sequence. Phase 1 sanity gate
      (Schwarzschild L<=2) confirmed cancel/together/identity all give [3,6,17].
      Recommendation: patch nbody/exact_growth_nbody.py simplify_generator()
      from cancel(expr) to together(expr).
    sequence: [3, 6, 17, 116]
  runtime: ~3.5 hours total (Phase 1 ~30s, Phase 2 ~50min, Phase 3 ~2h cancel timeout + ~90s together)
  cost_usd: 0
  run_command: python bench_flint/run_simplify_phases.py
  related_docs:
    - bench_flint/simplify_phases_summary.md
    - bench_flint/probe_flint.log
  tags: [diagnostic, benchmark, simplify, performance, P0, headline]

- id: simplify_generator_patch
  path: nbody/exact_growth_nbody.py
  category: engine
  scope: nbody
  status: complete
  description: |
    Patched nbody/exact_growth_nbody.py simplify_generator() from cancel(expr)
    to together(expr). Single-line change at line 290 plus together added to
    the SymPy imports at line 32. cancel still imported because it's used at
    line 686 in verify_jacobi_symbolic (one-shot, not the hot loop).

    Validation: bench_flint/validation_summary.md. 8-stage paranoid suite:
      Stage 0 - test_regression.py (4/4 pass)
      Stage 1 - Schwarzschild L<=2 smoke (PASS)
      Stage 2 - 8-potential battery at N=3 L<=3 (8/8 PASS)
      Stage 3 - spatial dim d=1,2,3 (3/3 PASS)
      Stage 4 - mass invariance (2/2 PASS, 1 best_effort SVD wall)
      Stage 5 - charged Coulomb (1/1 PASS, 3 best_effort SVD wall)
      Stage 6 - N=4 d=1 L<=2 PASS, L<=3 best_effort (SVD precision)
      Stage 7 - cross-check vs dataset (15/16 consistent prefixes)

    Speedup: >200x on Schwarzschild composite L<=3 (90s vs killed at 16 GB
    after 90 min with cancel). RAM use: <0.6 GB peak across all validated
    cases vs cancel hitting the 16 GB watchdog cap.
  inputs: []
  outputs:
    - nbody/exact_growth_nbody.py
    - bench_flint/validation_summary.md
    - bench_flint/validation_results.json
    - bench_flint/stage7_crosscheck.json
  latest_result:
    date: "2026-04-19"
    summary: |
      SHIPPED. The simplify swap is mathematically correct on every
      numerically clean test case. All 8 potential-battery cases match
      canonical [3, 6, 17, 116] bit-for-bit. All 3 spatial-dimension cases
      pass. Equal-mass and mild-mass-ratio cases pass. N=4 L<=2 passes.
      Best-effort failures are all the documented float64 SVD precision wall
      at extreme mass ratios, which cancel hits identically. Speedup is
      conservatively 100-200x on the heavy L=3 cases that have been
      bottlenecking the project for months.
    sequence: [3, 6, 17, 116]
  runtime: ~25 min total validation across 21 cases (Schwarzschild L<=3 was 90s)
  cost_usd: 0
  run_command: python bench_flint/validate_simplify_patch.py
  related_docs:
    - bench_flint/validation_summary.md
    - bench_flint/simplify_phases_summary.md
  tags: [engine, performance, simplify, P0, headline, complete]


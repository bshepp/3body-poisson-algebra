  path: nbody/symbolic_rank_nbody.py
  category: engine
  scope: nbody
  status: planned
  description: |
    Patch nbody/symbolic_rank_nbody.py _simplify (lines 318-320) from
    cancel(expr) to together(expr) following the same pattern as
    nbody/exact_growth_nbody.py.

    IMPORTANT: this engine's downstream is different. It uses DomainMatrix.rank
